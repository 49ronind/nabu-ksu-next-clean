name: Build Nabu HyperOS KernelSU-Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies & Setup Toolchain Symlinks
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-14 lld-14 llvm-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev bc patch curl
          
          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip

      - name: Clone Mahiro Kernel (KernelSU Branch)
        run: |
          git clone --depth=1 --branch KernelSU https://github.com/utziacre/android_kernel_xiaomi_nabu.git kernel

      - name: Inject KernelSU-Next v3.2.0-legacy
        run: |
          cd kernel
          rm -rf drivers/kernelsu
          git clone --depth=1 --branch legacy https://github.com/KernelSU-Next/KernelSU-Next.git /tmp/ksu-next
          cd /tmp/ksu-next
          git fetch --tags
          git checkout v3.2.0-legacy
          cd -
          cp -r /tmp/ksu-next/kernel drivers/kernelsu

      - name: Programmatically Inject KernelSU v3.2.0 Manual Hooks
        run: |
          cd kernel
          python3 -c '
          import os
          def inject_scoped(filepath, func_sig, anchor_line, hook_code, mode="after"):
              with open(filepath, "r") as f: lines = f.readlines()
              for i, line in enumerate(lines):
                  if func_sig in line and anchor_line in line:
                      if "CONFIG_KSU" in "".join(lines[max(0, i-5):i+5]): return
                      lines[i] = (line + "\n" + hook_code + "\n") if mode == "after" else (hook_code + "\n" + line)
                      with open(filepath, "w") as f: f.writelines(lines)
                      return
          
          # Inject hooks
          inject_scoped("fs/exec.c", "do_execveat_common", "int retval;", "#ifdef CONFIG_KSU\n\textern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\n\tksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\n#endif")
          inject_scoped("fs/open.c", "faccessat", "unsigned int lookup_flags", "#ifdef CONFIG_KSU\n\textern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif")
          inject_scoped("fs/read_write.c", "vfs_read", "if (!(file->f_mode & FMODE_CAN_READ))", "#ifdef CONFIG_KSU\n\tksu_handle_vfs_read(&file, &buf, &count, &pos);\n#endif", mode="before")
          inject_scoped("fs/stat.c", "vfs_statx", "struct path path;", "#ifdef CONFIG_KSU\n\textern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);\n\tksu_handle_stat(&dfd, &filename, &flags);\n#endif", mode="before")
          inject_scoped("kernel/reboot.c", "SYSCALL_DEFINE4(reboot", "SYSCALL_DEFINE4(reboot", "#ifdef CONFIG_KSU\nextern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n#endif", mode="before")
          inject_scoped("kernel/reboot.c", "SYSCALL_DEFINE4(reboot", "int ret = 0;", "#ifdef CONFIG_KSU\n\t{\n\t\tint ksu_ret = ksu_handle_sys_reboot(magic1, magic2, cmd, (void __user **)&arg);\n\t\tif (ksu_ret) return ksu_ret;\n\t}\n#endif")
          inject_scoped("drivers/input/input.c", "input_handle_event", "disposition = input_get_disposition", "#ifdef CONFIG_KSU\n\textern int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);\n\tksu_handle_input_handle_event(&type, &code, &value);\n#endif")
          '

      - name: Hardcode KernelSU Version and Fix Recursive Paths
        run: |
          cd kernel
          sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := 33189/" drivers/kernelsu/Kbuild
          sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := v3.2.0-legacy/" drivers/kernelsu/Kbuild
          # FACTUAL FIX: Use subdir-ccflags-y to recursively propagate include path
          echo 'subdir-ccflags-y += -I$(srctree)/drivers/kernelsu' >> drivers/kernelsu/Kbuild

      - name: Compile Kernel
        run: |
          cd kernel
          make ARCH=arm64 CC=clang-14 LD=ld.lld-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            O=out nabu_defconfig
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> out/.config
          make ARCH=arm64 CC=clang-14 LD=ld.lld-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            O=out -j$(nproc) Image

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Image-KSU-Next-33189
          path: kernel/out/arch/arm64/boot/Image
