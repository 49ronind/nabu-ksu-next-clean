name: Build Nabu HyperOS KernelSU-Next

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      LLVM: 1
      LLVM_IAS: 1
      CC: clang-14
      LD: ld.lld-14
      CROSS_COMPILE: aarch64-linux-gnu-
      CROSS_COMPILE_ARM32: arm-linux-gnueabi-
      KERNEL_REPO: https://github.com/utziacre/android_kernel_xiaomi_nabu.git
      KERNEL_BRANCH: KernelSU
      KSU_REPO: https://github.com/KernelSU-Next/KernelSU-Next.git
      KSU_TAG: v3.2.0-legacy
      KSU_VERSION_CODE: "33189"

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            clang-14 \
            curl \
            flex \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            git \
            libelf-dev \
            libssl-dev \
            lld-14 \
            llvm-14 \
            python3

          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip

          clang-14 --version
          ld.lld-14 --version
          aarch64-linux-gnu-gcc --version
          arm-linux-gnueabi-gcc --version

      - name: Clone Nabu kernel source
        run: |
          git clone --depth=1 \
            --branch "${KERNEL_BRANCH}" \
            "${KERNEL_REPO}" kernel

          cd kernel
          echo "Kernel commit: $(git rev-parse HEAD)"
          git status --short

      - name: Download KernelSU-Next Legacy
        run: |
          git clone --depth=1 \
            --branch legacy \
            "${KSU_REPO}" /tmp/ksu-next

          cd /tmp/ksu-next
          git fetch --depth=1 origin "refs/tags/${KSU_TAG}:refs/tags/${KSU_TAG}"
          git checkout --detach "${KSU_TAG}"

          echo "KernelSU-Next tag: $(git describe --tags --exact-match)"
          echo "KernelSU-Next commit: $(git rev-parse HEAD)"

      - name: Inject KernelSU-Next and UAPI headers
        run: |
          set -euxo pipefail

          cd kernel
          rm -rf drivers/kernelsu

          # KernelSU-Next core source
          cp -a /tmp/ksu-next/kernel/. drivers/kernelsu/

          # Required by KernelSU-Next v3.2.0 Legacy:
          # drivers/kernelsu/policy/app_profile.h includes <uapi/app_profile.h>
          test -d /tmp/ksu-next/kernel/uapi
          cp -a /tmp/ksu-next/kernel/uapi/. include/uapi/

          test -f drivers/kernelsu/Kbuild
          test -f drivers/kernelsu/Kconfig
          test -f include/uapi/app_profile.h

          echo "KernelSU source:"
          find drivers/kernelsu -maxdepth 2 -type f | sort | head -80

          echo "Injected UAPI headers:"
          find include/uapi -maxdepth 1 -type f -name '*app*profile*' -print

      - name: Apply KernelSU Manual Hooks
        run: |
          cd kernel

          python3 <<'PYTHON'
          from pathlib import Path
          import sys

          def fail(message):
              print(f"::error::{message}")
              sys.exit(1)

          def find_function_end(lines, start):
              depth = 0
              opened = False

              for index in range(start, len(lines)):
                  depth += lines[index].count("{")
                  depth -= lines[index].count("}")

                  if "{" in lines[index]:
                      opened = True

                  if opened and depth == 0:
                      return index

              return None

          def inject(filepath, function_signature, anchor, code, mode="after"):
              path = Path(filepath)

              if not path.is_file():
                  fail(f"Missing source file: {filepath}")

              lines = path.read_text().splitlines(keepends=True)

              function_start = None
              for index, line in enumerate(lines):
                  if function_signature in line:
                      function_start = index
                      break

              if function_start is None:
                  fail(f"Function signature not found in {filepath}: {function_signature}")

              function_end = find_function_end(lines, function_start)
              if function_end is None:
                  fail(f"Unable to find function end in {filepath}: {function_signature}")

              function_text = "".join(lines[function_start:function_end + 1])

              marker = code.strip().splitlines()[1].strip()
              if marker in function_text:
                  print(f"[=] Already present: {filepath} -> {function_signature}")
                  return

              anchor_index = None
              for index in range(function_start, function_end + 1):
                  if anchor in lines[index]:
                      anchor_index = index
                      break

              if anchor_index is None:
                  fail(
                      f"Anchor not found in {filepath} within {function_signature}: {anchor}"
                  )

              block = code.rstrip() + "
"

              if mode == "before":
                  lines.insert(anchor_index, block)
              elif mode == "after":
                  lines.insert(anchor_index + 1, block)
              else:
                  fail(f"Unknown injection mode: {mode}")

              path.write_text("".join(lines))
              print(f"[+] Injected: {filepath} -> {function_signature}")

          exec_hook = r'''
          #ifdef CONFIG_KSU
              extern int ksu_handle_execveat(
                  int *fd,
                  struct filename **filename_ptr,
                  void *argv,
                  void *envp,
                  int *flags
              );
              ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);
          #endif
          '''

          open_hook = r'''
          #ifdef CONFIG_KSU
              extern int ksu_handle_faccessat(
                  int *dfd,
                  const char __user **filename_user,
                  int *mode,
                  int *flags
              );
              ksu_handle_faccessat(&dfd, &filename, &mode, NULL);
          #endif
          '''

          read_hook = r'''
          #ifdef CONFIG_KSU
              ksu_handle_vfs_read(&file, &buf, &count, &pos);
          #endif
          '''

          stat_hook = r'''
          #ifdef CONFIG_KSU
              extern int ksu_handle_stat(
                  int *dfd,
                  const char __user **filename_user,
                  int *flags
              );
              ksu_handle_stat(&dfd, &filename, &flags);
          #endif
          '''

          reboot_declaration = r'''
          #ifdef CONFIG_KSU
          extern int ksu_handle_sys_reboot(
              int magic1,
              int magic2,
              unsigned int cmd,
              void __user **arg
          );
          #endif
          '''

          reboot_hook = r'''
          #ifdef CONFIG_KSU
              {
                  int ksu_ret = ksu_handle_sys_reboot(
                      magic1,
                      magic2,
                      cmd,
                      (void __user **)&arg
                  );
                  if (ksu_ret)
                      return ksu_ret;
              }
          #endif
          '''

          input_hook = r'''
          #ifdef CONFIG_KSU
              extern int ksu_handle_input_handle_event(
                  unsigned int *type,
                  unsigned int *code,
                  int *value
              );
              ksu_handle_input_handle_event(&type, &code, &value);
          #endif
          '''

          inject(
              "fs/exec.c",
              "do_execveat_common(",
              "int retval;",
              exec_hook,
              "after"
          )

          inject(
              "fs/open.c",
              "faccessat(",
              "unsigned int lookup_flags",
              open_hook,
              "after"
          )

          inject(
              "fs/read_write.c",
              "vfs_read(",
              "if (!(file->f_mode & FMODE_CAN_READ))",
              read_hook,
              "before"
          )

          inject(
              "fs/stat.c",
              "vfs_statx(",
              "struct path path;",
              stat_hook,
              "after"
          )

          inject(
              "kernel/reboot.c",
              "SYSCALL_DEFINE4(reboot",
              "SYSCALL_DEFINE4(reboot",
              reboot_declaration,
              "before"
          )

          inject(
              "kernel/reboot.c",
              "SYSCALL_DEFINE4(reboot",
              "int ret = 0;",
              reboot_hook,
              "after"
          )

          inject(
              "drivers/input/input.c",
              "input_handle_event(",
              "input_get_disposition",
              input_hook,
              "after"
          )
          PYTHON

      - name: Verify manual-hook calls
        run: |
          cd kernel

          grep -RIn \
            --include='*.c' \
            --include='*.h' \
            -e 'ksu_handle_execveat' \
            -e 'ksu_handle_faccessat' \
            -e 'ksu_handle_vfs_read' \
            -e 'ksu_handle_stat' \
            -e 'ksu_handle_sys_reboot' \
            -e 'ksu_handle_input_handle_event' \
            fs kernel drivers/input

      - name: Set KernelSU version fallbacks
        run: |
          set -euxo pipefail
          cd kernel

          sed -i \
            "s/^KSU_VERSION_FALLBACK := .*/KSU_VERSION_FALLBACK := ${KSU_VERSION_CODE}/" \
            drivers/kernelsu/Kbuild

          sed -i \
            "s/^KSU_VERSION_TAG_FALLBACK := .*/KSU_VERSION_TAG_FALLBACK := ${KSU_TAG}/" \
            drivers/kernelsu/Kbuild

          grep -E \
            '^(KSU_VERSION_FALLBACK|KSU_VERSION_TAG_FALLBACK) :=' \
            drivers/kernelsu/Kbuild

      - name: Generate Nabu configuration
        run: |
          set -euxo pipefail
          cd kernel

          make \
            ARCH="${ARCH}" \
            CC="${CC}" \
            LD="${LD}" \
            CROSS_COMPILE="${CROSS_COMPILE}" \
            CROSS_COMPILE_ARM32="${CROSS_COMPILE_ARM32}" \
            O=out \
            nabu_defconfig

          # Do not append duplicate CONFIG lines.
          # Kconfig will resolve all dependencies during olddefconfig.
          ./scripts/config \
            --file out/.config \
            --enable KSU \
            --enable KSU_MANUAL_HOOK

          make \
            ARCH="${ARCH}" \
            CC="${CC}" \
            LD="${LD}" \
            CROSS_COMPILE="${CROSS_COMPILE}" \
            CROSS_COMPILE_ARM32="${CROSS_COMPILE_ARM32}" \
            O=out \
            olddefconfig

          grep -E '^CONFIG_KSU' out/.config || true

          grep -q '^CONFIG_KSU=y$' out/.config || {
            echo "::error::CONFIG_KSU was not enabled"
            exit 1
          }

          grep -q '^CONFIG_KSU_MANUAL_HOOK=y$' out/.config || {
            echo "::error::CONFIG_KSU_MANUAL_HOOK was not enabled"
            exit 1
          }

      - name: Compile kernel Image
        run: |
          set -euxo pipefail
          cd kernel

          make \
            ARCH="${ARCH}" \
            CC="${CC}" \
            LD="${LD}" \
            CROSS_COMPILE="${CROSS_COMPILE}" \
            CROSS_COMPILE_ARM32="${CROSS_COMPILE_ARM32}" \
            O=out \
            -j"$(nproc)" \
            Image

          test -s out/arch/arm64/boot/Image

      - name: Create Image.gz and checksum
        run: |
          set -euxo pipefail

          gzip -n -c kernel/out/arch/arm64/boot/Image > Image.gz
          test -s Image.gz

          file Image.gz
          sha256sum Image.gz > Image.gz.sha256
          ls -lh Image.gz Image.gz.sha256

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: nabu-kernelsu-next-${{ env.KSU_VERSION_CODE }}
          path: |
            Image.gz
            Image.gz.sha256
          if-no-files-found: error
          retention-days: 14
