name: Build Nabu KernelSU Next

'on':
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            clang-14 \
            flex \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            git \
            libelf-dev \
            libssl-dev \
            lld-14 \
            llvm-14 \
            python3

          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip

          clang-14 --version
          ld.lld-14 --version

      - name: Clone Nabu kernel
        run: |
          git clone --depth=1 \
            --branch KernelSU \
            https://github.com/utziacre/android_kernel_xiaomi_nabu.git \
            kernel

          cd kernel
          echo "Kernel commit:"
          git rev-parse HEAD

      - name: Clone KernelSU Next Legacy
        run: |
          git clone --depth=1 \
            --branch legacy \
            https://github.com/KernelSU-Next/KernelSU-Next.git \
            ksu-next

          cd ksu-next
          git fetch --tags
          git checkout v3.2.0-legacy

          echo "KernelSU Next commit:"
          git rev-parse HEAD

      - name: Install KernelSU Next
        run: |
          set -e

          rm -rf kernel/drivers/kernelsu

          cp -a ksu-next/kernel/. kernel/drivers/kernelsu/
          cp -a ksu-next/kernel/include/uapi/. kernel/include/uapi/

          test -f kernel/drivers/kernelsu/Kbuild
          test -f kernel/drivers/kernelsu/Kconfig
          test -f kernel/include/uapi/app_profile.h

          echo "KernelSU Next source installed"
          echo "KernelSU UAPI header installed"

      - name: Patch KernelSU cpumask compatibility
        run: |
          set -e

          sed -i \
            's/&current->cpus_allowed/current->cpus_ptr/g' \
            kernel/drivers/kernelsu/selinux/rules.c

          echo "Patched cpumask references in rules.c"
          grep -n -E 'cpus_allowed|cpus_ptr' kernel/drivers/kernelsu/selinux/rules.c | head -20 || true

      - name: Apply KernelSU manual hooks
        run: |
          test -f scripts/inject_ksu_hooks.py
          python3 scripts/inject_ksu_hooks.py kernel

      - name: Set KernelSU version
        run: |
          set -e
          cd kernel

          sed -i \
            's/^KSU_VERSION_FALLBACK := .*/KSU_VERSION_FALLBACK := 33189/' \
            drivers/kernelsu/Kbuild

          sed -i \
            's/^KSU_VERSION_TAG_FALLBACK := .*/KSU_VERSION_TAG_FALLBACK := v3.2.0-legacy/' \
            drivers/kernelsu/Kbuild

          grep -E \
            '^(KSU_VERSION_FALLBACK|KSU_VERSION_TAG_FALLBACK) :=' \
            drivers/kernelsu/Kbuild

      - name: Generate Nabu defconfig
        run: |
          set -e
          cd kernel

          make ARCH=arm64 \
            CC=clang-14 \
            LD=ld.lld-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            O=out \
            nabu_defconfig

      - name: Enable KernelSU manual hooks
        run: |
          set -e
          cd kernel

          ./scripts/config \
            --file out/.config \
            --enable KSU

          ./scripts/config \
            --file out/.config \
            --enable KSU_MANUAL_HOOK

          ./scripts/config \
            --file out/.config \
            --disable KSU_WITH_KPROBES

          make ARCH=arm64 \
            CC=clang-14 \
            LD=ld.lld-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            O=out \
            olddefconfig

          echo "KernelSU configuration:"
          grep -E '^CONFIG_KSU|^# CONFIG_KSU_WITH_KPROBES' out/.config || true

          grep -q '^CONFIG_KSU=y$' out/.config
          grep -q '^CONFIG_KSU_MANUAL_HOOK=y$' out/.config

      - name: Inspect path_umount backport
        run: |
          cd kernel
          echo "Searching for path_umount and can_umount..."
          grep -RIn -e "path_umount(" -e "can_umount(" fs/namespace.c fs/internal.h || true

      - name: Build kernel Image
        run: |
          set -e
          cd kernel

          make ARCH=arm64 \
            CC=clang-14 \
            LD=ld.lld-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            O=out \
            -j"$(nproc)" \
            Image

          test -s out/arch/arm64/boot/Image

      - name: Create compressed image
        run: |
          set -e

          gzip -n -c \
            kernel/out/arch/arm64/boot/Image \
            > Image.gz

          test -s Image.gz

          sha256sum Image.gz > Image.gz.sha256

          ls -lh Image.gz Image.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nabu-kernelsu-next-33189
          path: |
            Image.gz
            Image.gz.sha256
          if-no-files-found: error
          retention-days: 14
