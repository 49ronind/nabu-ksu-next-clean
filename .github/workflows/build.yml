name: Build Nabu HyperOS KernelSU-Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies & Setup Toolchain Symlinks
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-14 lld-14 llvm-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev bc patch curl
          
          sudo ln -sf /usr/bin/llvm-ar-14 /usr/bin/llvm-ar
          sudo ln -sf /usr/bin/llvm-nm-14 /usr/bin/llvm-nm
          sudo ln -sf /usr/bin/llvm-objcopy-14 /usr/bin/llvm-objcopy
          sudo ln -sf /usr/bin/llvm-objdump-14 /usr/bin/llvm-objdump
          sudo ln -sf /usr/bin/llvm-strip-14 /usr/bin/llvm-strip

      - name: Clone Mahiro Kernel (KernelSU Branch)
        run: |
          git clone --depth=1 --branch KernelSU https://github.com/utziacre/android_kernel_xiaomi_nabu.git kernel

      - name: Inject KernelSU-Next v3.2.0-legacy
        run: |
          cd kernel
          rm -rf drivers/kernelsu
          git clone --depth=1 --branch legacy https://github.com/KernelSU-Next/KernelSU-Next.git /tmp/ksu-next
          cd /tmp/ksu-next
          git fetch --tags
          git checkout v3.2.0-legacy
          cd -
          cp -r /tmp/ksu-next/kernel drivers/kernelsu

      - name: Hardcode KernelSU Version and Fix Recursive Subdirectory Paths
        run: |
          cd kernel
          sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := 33189/" drivers/kernelsu/Kbuild
          sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := v3.2.0-legacy/" drivers/kernelsu/Kbuild
          
          # Factual Documentation Fix: Propagate include path recursively to all KSU subdirectories
          echo 'subdir-ccflags-y += -I$(srctree)/drivers/kernelsu' >> drivers/kernelsu/Kbuild

      - name: Generate Nabu Defconfig
        run: |
          cd kernel
          make ARCH=arm64 CC=clang-14 LD=ld.lld-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            O=out nabu_defconfig
            
          # Force enable KSU options AFTER defconfig generation just to be absolutely safe
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> out/.config

      - name: Compile Kernel
        run: |
          cd kernel
          make ARCH=arm64 CC=clang-14 LD=ld.lld-14 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            O=out -j$(nproc) Image

      - name: Compress Image
        run: |
          cd kernel
          gzip -c out/arch/arm64/boot/Image > ../Image.gz

      - name: Upload Image.gz Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Image-KSU-Next-33189
          path: Image.gz
